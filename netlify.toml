[build]
  command = "npm run build"
  publish = "dist"

# GIS redirect POST must reach a handler (body is not handled by SPA fallback).
[[redirects]]
  from = "/google-signin-callback"
  to = "/.netlify/functions/google-signin-callback"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
